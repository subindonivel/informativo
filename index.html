<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mentoria ViVa NeXt</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0a1a2f, #000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* LOGO TOPO */
    .logo {
      position: absolute;
      top: 50px;
      text-align: center;
      width: 100%;
    }

    .logo img {
      width: 100px;
      border-radius: 20px;
    }

    .logo h3 {
      margin-top: 10px;
      letter-spacing: 4px;
      color: #ccc;
      font-weight: normal;
    }

    /* CARD */
    .box {
      background: #0d1117;
      padding: 25px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
      text-align: center;
    }

    /* PERFIL */
    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      margin-bottom: 15px;
    }

    .profile img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile strong {
      display: block;
    }

    .profile p {
      margin: 0;
      font-size: 13px;
      color: #aaa;
    }

    /* BOTÃO */
    .btn {
      margin-top: 15px;
      display: block;
      padding: 12px;
      background: linear-gradient(90deg, #1f6feb, #3fb950);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    /* PROGRESSO */
    .progress {
      margin-top: 15px;
      height: 6px;
      background: #222;
      border-radius: 5px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #3fb950;
      animation: load 4s linear forwards;
    }

    @keyframes load {
      to { width: 100%; }
    }

    .timer {
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
    }

    .small {
      margin-top: 10px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
  <img src="logo.png" alt="Logo">
  <h3>MENTORIA</h3>
</div>

<!-- CARD -->
<div class="box">

  <div class="profile">
    <img src="foto.jpg" alt="Foto">
    <div>
      <strong>Atendimento no WhatsApp</strong>
      <p>Estamos conectando você com um atendente</p>
    </div>
  </div>

  <a class="btn" href="https://wa.me/5555996943720" target="_blank">
    ACESSAR
  </a>

  <div class="progress">
    <div class="bar"></div>
  </div>

  <div class="timer">
    Redirecionando em <span id="count">4</span>s...
  </div>

  <div class="small">
    Se o WhatsApp não abrir, clique em ACESSAR
  </div>

</div>

<script>
  let tempo = 4;
  const count = document.getElementById("count");

  const intervalo = setInterval(() => {
    tempo--;
    count.innerText = tempo;

    if (tempo === 0) {
      clearInterval(intervalo);
      window.location.href = "https://wa.me/5555996943720?text=Quero%20mais%20informações";
    }
  }, 1000);
</script>

</body>
</html>
